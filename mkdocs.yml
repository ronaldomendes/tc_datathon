site_name: Tech Challenge 05 - Datathon
plugins:
  - search

nav:
  - Início: index.md
  - Visão geral: overview.md
  - Estrutura do projeto: structure.md
  - Execução e deploy: running.md
  - API: api.md
  - ML Pipeline: pipeline.md
  - Sobre: about.md

markdown_extensions:
  - pymdownx.tasklist
  - pymdownx.emoji
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.highlight
  - pymdownx.superfences

theme:
  language: pt
  name: material
  font:
    text: Roboto
    code: Red Hat Mono
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: indigo
      accent: pink
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: teal
      accent: amber
extra:
  social:
    - icon: material/github
      link: https://github.com/ronaldomendes/tc_datathon
